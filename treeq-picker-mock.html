<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>TreeQ — Species Picker Mock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* =========================================================
   TreeQ — Species Picker Mock
   Validates the picker design in a real browser, divorced
   from the visualize-widget rendering surface.
   Design tokens match index.html v1.8 so this can be ported
   into the live app as the P1 (Favorites) feature.
   ========================================================= */
:root {
  --forest:        #2d5a3d;
  --forest-deep:   #1f3f2a;
  --forest-tint:   #3d7050;
  --gold:          #c9a23c;
  --gold-bright:   #e9c466;
  --bg:            #f4f8f1;
  --surface:       #ffffff;
  --surface-2:     #f0f4ec;
  --line:          #e3ead8;
  --ink:           #14241b;
  --ink-2:         #314a3a;
  --ink-3:         #6a7e72;
  --ink-faint:     #98a89d;
  --rose:          #c84d4d;
  --rose-bg:       #fde2e2;
  --warn-bg:       #fde7d7;
  --warn-fg:       #9a4216;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: #ddd;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: var(--ink-2);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
.app {
  max-width: 480px;
  min-height: 100vh;
  margin: 0 auto;
  background: var(--bg);
  box-shadow: 0 0 32px rgba(0,0,0,0.08);
  padding-bottom: 40px;
}

/* ------- Top bar ------- */
.topbar {
  background: var(--forest);
  color: white;
  padding: 16px 16px 18px;
  position: sticky; top: 0; z-index: 10;
}
.topbar h1 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}
.topbar h1 span { color: var(--gold-bright); }

/* ------- Search bar (explicit positioning, no flex tricks) ------- */
.search-wrap {
  position: relative;
  width: 100%;
}
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  color: var(--ink-faint);
  pointer-events: none;
  display: block;
}
.search-input {
  width: 100%;
  padding: 12px 14px 12px 44px;   /* 44px left clears the icon */
  border: 1px solid transparent;
  border-radius: 10px;
  background: var(--surface);
  font-size: 15px;
  font-family: inherit;
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-input::placeholder { color: var(--ink-faint); }
.search-input:focus {
  border-color: var(--forest-tint);
  box-shadow: 0 0 0 3px rgba(61,112,80,0.18);
}

/* ------- Pills ------- */
.pills {
  display: flex;
  gap: 8px;
  padding: 14px 16px 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.pills::-webkit-scrollbar { display: none; }
.pill {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--ink-2);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.pill:hover { border-color: var(--forest-tint); }
.pill.active {
  background: var(--forest);
  color: white;
  border-color: var(--forest);
}
.pill .count { opacity: 0.7; margin-left: 4px; font-weight: 400; }

/* ------- Genus grid ------- */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px 16px 24px;
}
.tile {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 22px 14px 14px;
  cursor: pointer;
  text-align: center;
  font-family: inherit;
  color: inherit;
  min-height: 150px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: transform 0.1s ease, box-shadow 0.15s, border-color 0.15s;
}
.tile:hover { border-color: var(--forest-tint); }
.tile:active { transform: scale(0.98); }

.tile-leaf {
  width: 56px;
  height: 56px;
  color: var(--forest);
  margin-bottom: 10px;
  display: block;
}
.tile-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 2px;
}
.tile-latin {
  font-size: 12px;
  font-style: italic;
  color: var(--ink-3);
}
.tile-count {
  position: absolute;
  bottom: 8px;
  right: 10px;
  font-size: 11px;
  color: var(--ink-faint);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
}

/* ------- Heart button (explicit SVG, two paths, class-toggle) ------- */
.heart-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 36px;
  height: 36px;
  border-radius: 999px;
  border: 0;
  background: rgba(255,255,255,0.92);
  cursor: pointer;
  color: var(--ink-faint);
  padding: 0;
  display: grid;
  place-items: center;
  transition: color 0.15s, background 0.15s, transform 0.1s;
  font-family: inherit;
}
.heart-btn:hover { color: var(--rose); background: white; }
.heart-btn:active { transform: scale(0.92); }
.heart-btn.active { color: var(--rose); background: var(--rose-bg); }

/* The button contains BOTH a hollow heart and a filled heart;
   CSS hides one based on .active state. */
.heart-btn svg {
  width: 20px;
  height: 20px;
  display: block;
}
.heart-btn .heart-filled { display: none; }
.heart-btn.active .heart-empty { display: none; }
.heart-btn.active .heart-filled { display: block; }

/* ------- Species view (drill-down) ------- */
.species-view {
  padding: 16px;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: 0;
  color: var(--forest);
  font-size: 14px;
  font-weight: 600;
  padding: 8px 0;
  cursor: pointer;
  font-family: inherit;
  margin-bottom: 8px;
}
.back-btn svg { width: 16px; height: 16px; }
.species-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 2px;
}
.species-subtitle {
  font-size: 13px;
  color: var(--ink-3);
  margin-bottom: 16px;
}
.species-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.species-row {
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 12px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
}
.species-row:hover { border-color: var(--forest-tint); }
.species-row:active { transform: scale(0.99); }
.species-row .row-leaf {
  width: 36px;
  height: 36px;
  color: var(--forest);
  flex-shrink: 0;
  display: block;
}
.species-row .info { flex: 1; min-width: 0; }
.species-row .name {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.species-row .latin {
  font-size: 12px;
  font-style: italic;
  color: var(--ink-3);
  margin-top: 2px;
}
.species-flag {
  display: inline-block;
  background: var(--warn-bg);
  color: var(--warn-fg);
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 700;
  font-style: normal;
}
.photo-btn {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--surface-2);
  cursor: pointer;
  display: grid;
  place-items: center;
  color: var(--ink-3);
  flex-shrink: 0;
  font-family: inherit;
  padding: 0;
}
.photo-btn:hover { color: var(--forest); border-color: var(--forest-tint); }
.photo-btn svg { width: 18px; height: 18px; }

/* Heart in species row uses inline variant */
.heart-btn.inline {
  position: static;
  width: 36px;
  height: 36px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  flex-shrink: 0;
}

/* ------- Empty state ------- */
.empty {
  padding: 48px 24px;
  text-align: center;
  color: var(--ink-3);
  grid-column: 1 / -1;
}
.empty-icon {
  width: 48px;
  height: 48px;
  color: var(--ink-faint);
  margin: 0 auto 12px;
  display: block;
}
.empty h3 { font-size: 16px; color: var(--ink-2); margin-bottom: 4px; font-weight: 600; }
.empty p { font-size: 13px; max-width: 280px; margin: 0 auto; }

/* ------- Toast for selection feedback ------- */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: white;
  padding: 12px 18px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: transform 0.25s, opacity 0.25s;
  z-index: 100;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.hidden { display: none !important; }

/* ------- Flag explanation modal ------- */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(20, 36, 27, 0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: 16px;
  animation: fadeIn 0.15s ease;
}
.modal-backdrop.hidden { display: none !important; }
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
.modal-content {
  position: relative;
  background: var(--surface);
  border-radius: 16px;
  padding: 28px 20px 22px;
  max-width: 360px;
  width: 100%;
  box-shadow: 0 20px 50px rgba(0,0,0,0.22);
}
.modal-close {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 32px;
  height: 32px;
  border: 0;
  background: transparent;
  font-size: 22px;
  line-height: 1;
  color: var(--ink-3);
  cursor: pointer;
  border-radius: 8px;
  font-family: inherit;
  padding: 0;
}
.modal-close:hover { background: var(--surface-2); color: var(--ink); }
#modal-token {
  display: inline-block;
  background: var(--warn-bg);
  color: var(--warn-fg);
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 700;
  margin-bottom: 12px;
}
#modal-description {
  font-size: 14px;
  color: var(--ink-2);
  line-height: 1.55;
}
.modal-source {
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 16px;
  border-top: 1px solid var(--line);
  padding-top: 10px;
  font-style: italic;
}

/* species-flag is now a button — give it explicit affordance */
.species-flag {
  cursor: pointer;
  border: 0;
  font-family: inherit;
  transition: filter 0.15s, transform 0.08s;
}
.species-flag:hover { filter: brightness(0.92); }
.species-flag:active { transform: scale(0.94); }

</style>
</head>
<body>
<div class="app" id="app">
  <header class="topbar">
    <h1>Tree<span>Q</span> · Select Species</h1>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7"/>
        <path d="M21 21l-4.3-4.3"/>
      </svg>
      <input type="text" class="search-input" id="search" placeholder="Search species or genus..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
    </div>
  </header>

  <div class="pills" id="pills">
    <button class="pill active" data-filter="all" type="button">All</button>
    <button class="pill" data-filter="recent" type="button">Recent</button>
    <button class="pill" data-filter="frequent" type="button">Frequent</button>
    <button class="pill" data-filter="favorites" type="button">Favorites <span class="count" id="fav-count"></span></button>
  </div>

  <div id="genus-view">
    <div class="grid" id="grid"></div>
  </div>

  <div id="species-view" class="species-view hidden">
    <button class="back-btn" id="back" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
      </svg>
      Back
    </button>
    <h2 class="species-title" id="species-title"></h2>
    <p class="species-subtitle" id="species-subtitle"></p>
    <div class="species-list" id="species-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-backdrop hidden" id="flag-modal" role="dialog" aria-modal="true" aria-labelledby="modal-token">
  <div class="modal-content">
    <button class="modal-close" id="modal-close" aria-label="Close" type="button">&times;</button>
    <span id="modal-token"></span>
    <div id="modal-description"></div>
    <div class="modal-source" id="modal-source"></div>
  </div>
</div>
<script>
/* ============================================================
   Heart paths — sourced from /icons/heart-empty.svg and
   /icons/heart-filled.svg (Cameron-supplied). Both inlined
   here so the picker is fully self-contained.

   heart-empty: 512x512 viewBox, compound path (outer heart +
     inner cutout) — renders as an outlined hollow heart
     under nonzero fill-rule.
   heart-filled: 24x24 viewBox, single solid heart path.

   Both use fill="currentColor" so the button's CSS color
   drives appearance: ink-faint default, rose on hover/active.
   ============================================================ */
const HEART_EMPTY_PATH = 'M474.644,74.27C449.391,45.616,414.358,29.836,376,29.836c-53.948,0-88.103,32.22-107.255,59.25c-4.969,7.014-9.196,14.047-12.745,20.665c-3.549-6.618-7.775-13.651-12.745-20.665c-19.152-27.03-53.307-59.25-107.255-59.25c-38.358,0-73.391,15.781-98.645,44.435C13.267,101.605,0,138.213,0,177.351c0,42.603,16.633,82.228,52.345,124.7c31.917,37.96,77.834,77.088,131.005,122.397c19.813,16.884,40.302,34.344,62.115,53.429l0.655,0.574c2.828,2.476,6.354,3.713,9.88,3.713s7.052-1.238,9.88-3.713l0.655-0.574c21.813-19.085,42.302-36.544,62.118-53.431c53.168-45.306,99.085-84.434,131.002-122.395C495.367,259.578,512,219.954,512,177.351C512,138.213,498.733,101.605,474.644,74.27z M309.193,401.614c-17.08,14.554-34.658,29.533-53.193,45.646c-18.534-16.111-36.113-31.091-53.196-45.648C98.745,312.939,30,254.358,30,177.351c0-31.83,10.605-61.394,29.862-83.245C79.34,72.007,106.379,59.836,136,59.836c41.129,0,67.716,25.338,82.776,46.594c13.509,19.064,20.558,38.282,22.962,45.659c2.011,6.175,7.768,10.354,14.262,10.354c6.494,0,12.251-4.179,14.262-10.354c2.404-7.377,9.453-26.595,22.962-45.66c15.06-21.255,41.647-46.593,82.776-46.593c29.621,0,56.66,12.171,76.137,34.27C471.395,115.957,482,145.521,482,177.351C482,254.358,413.255,312.939,309.193,401.614z';
const HEART_FILLED_PATH = 'm11.466 22.776c.141.144.333.224.534.224s.393-.08.534-.224l9.594-9.721c4.001-4.053 1.158-11.055-4.532-11.055-3.417 0-4.985 2.511-5.596 2.98-.614-.471-2.172-2.98-5.596-2.98-5.672 0-8.55 6.984-4.531 11.055z';

/* ============================================================
   Species data — sourced from species_data/master_species_list.csv
   Snapshot of the 36 picker species' CSV rows. Re-build this
   block when the CSV is updated. (For the deployed app this
   would come from a fetched JSON, not be inlined.)
   ============================================================ */
const SPECIES_DATA = {
  'Acer rubrum': { flag: 'No', reason: 'Standing inventory; no current acute removal driver' },
  'Acer saccharinum': { flag: 'Yes', reason: 'Weak wood, storm-prone' },
  'Acer saccharum': { flag: 'No', reason: 'Standing inventory; no current acute removal driver' },
  'Acer platanoides': { flag: 'Yes', reason: 'Invasive (NE/PNW); weak unions; storm-prone' },
  'Fraxinus pennsylvanica': { flag: 'Yes', reason: 'EAB - active mortality in 36 states' },
  'Fraxinus americana': null,  // not in CSV (rural/NE species)
  'Fraxinus nigra': null,  // not in CSV (rural/NE species)
  'Pinus strobus': null,  // not in CSV (rural/NE species)
  'Picea abies': null,  // not in CSV (rural/NE species)
  'Tsuga canadensis': null,  // not in CSV (rural/NE species)
  'Juniperus virginiana': null,  // not in CSV (rural/NE species)
  'Quercus rubra': { flag: 'Maybe', reason: 'Oak wilt risk in IL/IA/MI/MN/WI' },
  'Quercus palustris': { flag: 'Maybe', reason: 'Mature removals' },
  'Quercus alba': { flag: 'No', reason: 'Standing inventory; no current acute removal driver' },
  'Quercus macrocarpa': null,  // not in CSV (rural/NE species)
  'Carya ovata': null,  // not in CSV (rural/NE species)
  'Carya cordiformis': null,  // not in CSV (rural/NE species)
  'Carya glabra': null,  // not in CSV (rural/NE species)
  'Betula papyrifera': null,  // not in CSV (rural/NE species)
  'Betula nigra': null,  // not in CSV (rural/NE species)
  'Betula alleghaniensis': null,  // not in CSV (rural/NE species)
  'Betula populifolia': null,  // not in CSV (rural/NE species)
  'Ulmus americana': { flag: 'No', reason: 'Standing inventory; no current acute removal driver' },
  'Ulmus rubra': null,  // not in CSV (rural/NE species)
  'Ulmus pumila': { flag: 'Yes', reason: 'Invasive Plains/Mtn West' },
  'Prunus serotina': null,  // not in CSV (rural/NE species)
  'Prunus pensylvanica': null,  // not in CSV (rural/NE species)
  'Prunus serrulata \'Kwanzan\'': { flag: 'Maybe', reason: 'Shorter lifespan, ornamental decline' },
  'Robinia pseudoacacia': { flag: 'No', reason: 'Standing inventory; no current acute removal driver' },
  'Gleditsia triacanthos': { flag: 'Maybe', reason: 'Canker, borers, large planting base' },
  'Fagus grandifolia': { flag: 'Yes', reason: 'Beech leaf disease - 13 states + ON; 5yr sapling mortality' },
  'Liriodendron tulipifera': { flag: 'Maybe', reason: 'Large mature size, storm/conflict' },
  'Platanus occidentalis': { flag: 'Maybe', reason: 'Anthracnose, large mature size' },
  'Platanus × acerifolia': { flag: 'Maybe', reason: 'Anthracnose, large size' },
  'Juglans nigra': null,  // not in CSV (rural/NE species)
  'Juglans cinerea': null,  // not in CSV (rural/NE species)
};

/* ============================================================
   deriveFlag — turn a free-text removal_reason into a short
   token. Order matters: most specific patterns first.
   ============================================================ */
function deriveFlag(reason) {
  if (!reason) return null;
  const r = reason.toLowerCase();
  /* Only species-specific, named conditions get tags. Generics
     like 'size', 'storm-prone', 'borers', 'decline', 'shorter
     lifespan' could describe almost any tree — they don't earn a
     pill here. If the only reason is generic, return null and the
     species shows no flag. */
  if (/eab|emerald ash/.test(r)) return 'EAB';
  if (/hemlock woolly|\bhwa\b/.test(r)) return 'HWA';
  if (/oak wilt/.test(r)) return 'oak wilt';
  if (/beech leaf/.test(r)) return 'BLD';
  if (/bronze birch borer/.test(r)) return 'BBB';
  if (/diplodia/.test(r)) return 'diplodia';
  if (/anthracnose/.test(r)) return 'anthracnose';
  if (/banned|bradford|callery/.test(r)) return 'banned';
  if (/invasive/.test(r)) return 'invasive';
  if (/needle cast/.test(r)) return 'needle cast';
  if (/iron chlorosis|chlorosis/.test(r)) return 'chlorosis';
  if (/gumball|fruit nuisance/.test(r)) return 'fruit drop';
  if (/wildfire/.test(r)) return 'wildfire';
  if (/scab/.test(r)) return 'scab';
  return null;
}

/* ============================================================
   computeFlag — what flag (if any) to display on a species row.
   - CSV says Yes/Maybe → derive from reason, source = 'csv'
   - CSV says No        → no flag (overrides any hand-coded one)
   - Not in CSV         → fall back to hand-coded flag, source = 'authored'
   - Not in CSV, no hand-coded → no flag
   The tooltip shows the source so we can audit at a glance.
   ============================================================ */
function computeFlag(species) {
  const csv = SPECIES_DATA[species.latin];
  if (csv) {
    if (csv.flag === 'Yes' || csv.flag === 'Maybe') {
      const token = deriveFlag(csv.reason);
      if (!token) return null;  // CSV says removable but for a generic reason — no tag
      return { token: token, reason: csv.reason, source: 'CSV (city-inventory dataset)' };
    }
    return null;
  }
  if (species.flag) {
    return { token: species.flag, reason: 'Authored from arboricultural knowledge — species not in city-inventory CSV', source: 'hand-coded' };
  }
  return null;
}

/* Tap-target descriptions — each token gets a one-paragraph
   explanation users see when they tap a flag pill. */
const FLAG_DESCRIPTIONS = {

/* ============================================================
   State
   ============================================================ */
let currentFilter = 'all';
let currentGenus = null;
let searchTerm = '';

/* ============================================================
   Persistence — localStorage
   Per memory: Recent / Frequent should derive from
   customer-tree-entry timestamps in the production app.
   In this mock, we simulate by tracking genus + species opens.
   ============================================================ */
const LS_FAV    = 'treeq.favorites';
const LS_RECENT = 'treeq.recent';
const LS_FREQ   = 'treeq.frequency';

function getFavorites() { try { return JSON.parse(localStorage.getItem(LS_FAV)) || []; } catch (e) { return []; } }
function setFavorites(arr) { localStorage.setItem(LS_FAV, JSON.stringify(arr)); updateFavCount(); }
function toggleFavorite(id) {
  const f = getFavorites();
  const i = f.indexOf(id);
  if (i === -1) f.push(id); else f.splice(i, 1);
  setFavorites(f);
  return f.includes(id);
}
function getRecent() { try { return JSON.parse(localStorage.getItem(LS_RECENT)) || []; } catch (e) { return []; } }
function pushRecent(id) {
  const r = getRecent().filter(x => x !== id);
  r.unshift(id);
  localStorage.setItem(LS_RECENT, JSON.stringify(r.slice(0, 10)));
  const f = JSON.parse(localStorage.getItem(LS_FREQ) || '{}');
  f[id] = (f[id] || 0) + 1;
  localStorage.setItem(LS_FREQ, JSON.stringify(f));
}
function getFrequent() {
  const f = JSON.parse(localStorage.getItem(LS_FREQ) || '{}');
  return Object.entries(f).sort((a,b) => b[1]-a[1]).map(x => x[0]);
}
function updateFavCount() {
  const c = getFavorites().length;
  document.getElementById('fav-count').textContent = c ? '(' + c + ')' : '';
}

/* ============================================================
   Render helpers
   ============================================================ */
function heartSVG() {
  /* Two separate <svg> elements; CSS toggles which is visible
     based on .heart-btn.active. Each preserves its own viewBox
     so the source artwork renders at native proportions. */
  return '<svg class="heart-empty" viewBox="0 0 512 512" aria-hidden="true">' +
         '<path d="' + HEART_EMPTY_PATH + '" fill="currentColor"/>' +
         '</svg>' +
         '<svg class="heart-filled" viewBox="0 0 24 24" aria-hidden="true">' +
         '<path d="' + HEART_FILLED_PATH + '" fill="currentColor"/>' +
         '</svg>';
}

function leafSVG(iconKey, size) {
  size = size || 56;
  const inner = ICONS[iconKey] || ICONS.other;
  return '<svg viewBox="0 0 64 64" width="' + size + '" height="' + size + '" fill="currentColor" aria-hidden="true">' + inner + '</svg>';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ============================================================
   Genus grid render
   ============================================================ */
function renderGenusGrid() {
  const grid = document.getElementById('grid');
  const favorites = getFavorites();
  const recent = getRecent();
  const frequent = getFrequent();

  let list = GENERA.slice();

  if (currentFilter === 'favorites') {
    list = list.filter(g => favorites.includes(g.id) || g.species.some(s => favorites.includes(s.id)));
  } else if (currentFilter === 'recent') {
    const recentSet = new Set(recent);
    list = list
      .filter(g => recentSet.has(g.id) || g.species.some(s => recentSet.has(s.id)))
      .sort((a, b) => recent.indexOf(a.id) - recent.indexOf(b.id));
  } else if (currentFilter === 'frequent') {
    const freqIds = new Set(frequent.slice(0, 12));
    list = list.filter(g => freqIds.has(g.id) || g.species.some(s => freqIds.has(s.id)));
  }

  if (searchTerm) {
    const t = searchTerm.toLowerCase();
    list = list.filter(g =>
      g.name.toLowerCase().includes(t) ||
      g.latin.toLowerCase().includes(t) ||
      g.species.some(s => s.common.toLowerCase().includes(t) || s.latin.toLowerCase().includes(t))
    );
  }

  if (list.length === 0) {
    const msg = currentFilter === 'favorites'
      ? 'Tap the heart on any genus or species to favorite it.'
      : currentFilter === 'recent'
      ? "You haven't selected any species yet."
      : currentFilter === 'frequent'
      ? "No frequency data yet — pick a few species to populate this."
      : 'Try a different search term.';
    grid.innerHTML =
      '<div class="empty">' +
      '<svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
      '<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>' +
      '</svg>' +
      '<h3>No matches</h3>' +
      '<p>' + msg + '</p>' +
      '</div>';
    return;
  }

  grid.innerHTML = list.map(g => {
    const fav = favorites.includes(g.id);
    return (
      '<button class="tile" data-genus="' + g.id + '" type="button">' +
      '<span class="heart-btn ' + (fav ? 'active' : '') + '" data-heart="' + g.id + '" role="button" aria-label="Favorite ' + g.name + '" tabindex="0">' + heartSVG() + '</span>' +
      '<span class="tile-count" title="' + g.species.length + ' species in this genus">' + g.species.length + '</span>' +
      '<span class="tile-leaf">' + leafSVG(g.icon) + '</span>' +
      '<span class="tile-name">' + g.name + '</span>' +
      '<span class="tile-latin">' + g.latin + '</span>' +
      '</button>'
    );
  }).join('');

  grid.querySelectorAll('.tile').forEach(tile => {
    tile.addEventListener('click', e => {
      if (e.target.closest('[data-heart]')) return;
      openGenus(tile.dataset.genus);
    });
  });
  grid.querySelectorAll('[data-heart]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.heart;
      const isFav = toggleFavorite(id);
      btn.classList.toggle('active', isFav);
    });
  });
}

/* ============================================================
   Species drill-down
   ============================================================ */
function openGenus(id) {
  const g = GENERA.find(x => x.id === id);
  if (!g) return;
  currentGenus = g;
  pushRecent(g.id);
  document.getElementById('genus-view').classList.add('hidden');
  document.getElementById('species-view').classList.remove('hidden');
  document.getElementById('species-title').textContent = g.name;
  document.getElementById('species-subtitle').innerHTML = '<em>' + g.latin + '</em> · ' + g.species.length + ' species';
  window.scrollTo(0, 0);

  const list = document.getElementById('species-list');
  const favorites = getFavorites();
  list.innerHTML = g.species.map(s => {
    const fav = favorites.includes(s.id);
    const flagInfo = computeFlag(s);
    const flag = flagInfo
      ? ' <button type="button" class="species-flag"' +
        ' data-token="' + flagInfo.token + '"' +
        ' data-reason="' + flagInfo.reason.replace(/"/g, '&quot;') + '"' +
        ' data-source="' + flagInfo.source + '">' +
        flagInfo.token + '</button>'
      : '';
    return (
      '<div class="species-row" data-species="' + s.id + '" data-name="' + s.common + '">' +
      '<span class="row-leaf">' + leafSVG(g.icon, 36) + '</span>' +
      '<div class="info">' +
      '<div class="name">' + s.common + flag + '</div>' +
      '<div class="latin">' + s.latin + '</div>' +
      '</div>' +
      '<button class="photo-btn" type="button" title="Preview leaf, bark, structure" aria-label="Preview photos">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
      '<rect x="3" y="5" width="18" height="14" rx="2"/>' +
      '<circle cx="9" cy="11" r="2"/>' +
      '<path d="M21 17l-5-5-9 9"/>' +
      '</svg>' +
      '</button>' +
      '<button class="heart-btn inline ' + (fav ? 'active' : '') + '" data-heart-species="' + s.id + '" type="button" aria-label="Favorite ' + s.common + '">' + heartSVG() + '</button>' +
      '</div>'
    );
  }).join('');

  list.querySelectorAll('[data-heart-species]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.heartSpecies;
      const isFav = toggleFavorite(id);
      btn.classList.toggle('active', isFav);
    });
  });
  list.querySelectorAll('.photo-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      showToast('Photo preview (leaf · bark · structure) — placeholder');
    });
  });
  list.querySelectorAll('.species-flag').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      showFlagModal(btn.dataset.token, btn.dataset.reason, btn.dataset.source);
    });
  });
  list.querySelectorAll('.species-row').forEach(row => {
    row.addEventListener('click', e => {
      if (e.target.closest('button')) return;
      pushRecent(row.dataset.species);
      showToast('Selected: ' + row.dataset.name);
    });
  });
}

function closeGenus() {
  currentGenus = null;
  document.getElementById('species-view').classList.add('hidden');
  document.getElementById('genus-view').classList.remove('hidden');
  renderGenusGrid();
  window.scrollTo(0, 0);
}

/* ============================================================
   Wire up
   ============================================================ */
document.getElementById('back').addEventListener('click', closeGenus);
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  renderGenusGrid();
});
document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    currentFilter = p.dataset.filter;
    /* If we're inside a genus drill-down, pop back to the genus grid
       with the new filter applied. */
    if (currentGenus) {
      closeGenus();
    } else {
      renderGenusGrid();
    }
  });
});

/* Initial render */
updateFavCount();
renderGenusGrid();

console.log('%cTreeQ picker mock loaded', 'color:#2d5a3d;font-weight:bold;');
/* ============================================================
   Flag explanation modal — tap any flag pill to open
   ============================================================ */
function showFlagModal(token, reason, source) {
  document.getElementById('modal-token').textContent = token;
  document.getElementById('modal-description').textContent =
    FLAG_DESCRIPTIONS[token] || 'No detailed explanation available for this flag.';
  document.getElementById('modal-source').textContent =
    '"' + reason + '"  ·  source: ' + source;
  document.getElementById('flag-modal').classList.remove('hidden');
}
function hideFlagModal() {
  document.getElementById('flag-modal').classList.add('hidden');
}
document.getElementById('modal-close').addEventListener('click', hideFlagModal);
document.getElementById('flag-modal').addEventListener('click', e => {
  if (e.target.id === 'flag-modal') hideFlagModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') hideFlagModal();
});

console.log('Genera:', GENERA.length, '· Total species:', GENERA.reduce((n,g) => n + g.species.length, 0));
