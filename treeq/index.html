<style>html,body{height:100%;margin:0;background:#f4f8f1;font-family:Inter,-apple-system,sans-serif;color:#2d5a3d;display:flex;align-items:center;justify-content:center;}
a{color:#2d5a3d;font-weight:600;text-decoration:none;}</style>

<body>
  <p>Loading TreeQ&hellip; <a href="/login.html">tap here if you aren't redirected</a>.</p>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
  <script>
    // Smart router: signed in -> dashboard, otherwise -> login.
    (async function () {
      try {
        var sb = window.supabase && window.supabase.createClient(
          window.__SUPABASE_URL__, window.__SUPABASE_ANON_KEY__,
          { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true } }
        );
        if (sb) {
          var r = await sb.auth.getSession();
          if (r && r.data && r.data.session) {
            location.replace('/dashboard.html');
            return;
          }
        }
      } catch (e) {}
      location.replace('/login.html');
    })();
  </script>
</body>
