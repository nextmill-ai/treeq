<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Trees — TreeQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<style>
  :root {
    --forest: #2d5a3d;
    --forest-light: #3a7350;
    --cream: #f4f8f1;
    --gold: #e9c466;
    --text: #1a2e1f;
    --muted: #6b7c6e;
    --border: #d4e6d0;
    --card-bg: #fff;
    --danger: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, system-ui, sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100dvh;
  }

  /* ── header ── */
  .topbar {
    background: var(--forest);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-brand { font-weight: 700; font-size: 1.15rem; letter-spacing: .02em; }
  .topbar-brand span { color: var(--gold); }
  .topbar-nav { display: flex; gap: .5rem; }
  .topbar-nav a {
    color: rgba(255,255,255,.8);
    text-decoration: none;
    font-size: .85rem;
    padding: .25rem .5rem;
    border-radius: 6px;
  }
  .topbar-nav a:hover { background: rgba(255,255,255,.12); color: #fff; }

  /* ── layout ── */
  .page {
    max-width: 680px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }
  h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 1rem; }
  .subtitle { color: var(--muted); font-size: .9rem; margin-bottom: 1.5rem; }

  /* ── controls ── */
  .controls {
    display: flex;
    align-items: center;
    gap: .75rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    padding: .5rem 1rem;
    border-radius: 8px;
    font-size: .875rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: background .15s;
  }
  .btn-primary { background: var(--forest); color: #fff; }
  .btn-primary:hover { background: var(--forest-light); }
  .btn-ghost {
    background: transparent;
    color: var(--forest);
    border: 1.5px solid var(--border);
  }
  .btn-ghost:hover { background: var(--border); }
  .btn-danger { background: var(--danger); color: #fff; font-size: .8rem; padding: .35rem .7rem; }
  .btn-danger:hover { opacity: .85; }

  input[type="search"] {
    flex: 1;
    min-width: 140px;
    padding: .5rem .75rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: .875rem;
    font-family: inherit;
    background: #fff;
    color: var(--text);
  }
  input[type="search"]:focus { outline: none; border-color: var(--forest-light); }

  /* ── tree cards ── */
  .tree-list { display: flex; flex-direction: column; gap: .75rem; }

  .tree-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1rem 1rem 1.1rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: .25rem .5rem;
    align-items: start;
  }
  .tree-card-name {
    font-weight: 600;
    font-size: 1rem;
  }
  .tree-card-delete {
    grid-row: 1;
    grid-column: 2;
    align-self: center;
  }
  .tree-card-meta {
    color: var(--muted);
    font-size: .82rem;
    grid-column: 1 / -1;
    display: flex;
    flex-wrap: wrap;
    gap: .35rem .75rem;
    margin-top: .25rem;
  }
  .tree-card-meta span { white-space: nowrap; }
  .tree-card-notes {
    grid-column: 1 / -1;
    font-size: .83rem;
    color: var(--muted);
    font-style: italic;
    margin-top: .3rem;
    border-top: 1px solid var(--border);
    padding-top: .4rem;
  }
  .tree-card-gps {
    grid-column: 1 / -1;
    font-size: .78rem;
    color: var(--muted);
    margin-top: .2rem;
  }

  /* ── empty / loading states ── */
  .state-box {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }
  .state-box p { margin-bottom: .75rem; font-size: .95rem; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--forest);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── toast ── */
  #toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: #fff;
    padding: .6rem 1.25rem;
    border-radius: 999px;
    font-size: .875rem;
    font-weight: 500;
    transition: transform .25s ease;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── auth gate ── */
  #auth-gate {
    text-align: center;
    padding: 3rem 1rem;
  }
  #auth-gate p { margin-bottom: 1rem; color: var(--muted); }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">Tree<span>Q</span></div>
  <nav class="topbar-nav">
    <a href="advanced-removal.html">Advanced Removal</a>
    <a href="my-trees.html" style="color:#fff;font-weight:600">My Trees</a>
    <a href="settings.html">Settings</a>
    <a href="dashboard.html">AI</a>
  </nav>
</header>

<main class="page">
  <!-- signed-out gate -->
  <div id="auth-gate" style="display:none">
    <p>Sign in to see your saved trees.</p>
    <a href="login.html?next=my-trees.html" class="btn btn-primary">Sign in</a>
  </div>

  <!-- signed-in content -->
  <div id="app" style="display:none">
    <h1>My Trees</h1>
    <p class="subtitle" id="subtitle">Loading…</p>

    <div class="controls">
      <input type="search" id="search" placeholder="Search by species or notes…" oninput="filterCards()">
      <a href="advanced-removal.html" class="btn btn-primary">+ New calculation</a>
    </div>

    <div id="list" class="tree-list">
      <div class="state-box"><div class="spinner"></div><p>Loading trees…</p></div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" crossorigin="anonymous"></script>
<script>
'use strict';

const SUPABASE_URL  = window.__SUPABASE_URL__  || '';
const SUPABASE_ANON = window.__SUPABASE_ANON_KEY__ || '';

const sbClient = (SUPABASE_URL && SUPABASE_ANON)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON)
  : null;

let allTrees = [];

// ── species name map (pulled from /api/species on load) ──────────────────
const speciesNames = {};

async function loadSpeciesNames() {
  try {
    const r = await fetch('/api/species');
    if (!r.ok) return;
    const d = await r.json();
    for (const s of (d.species || [])) speciesNames[s.key] = s.name;
  } catch { /* non-fatal */ }
}

// ── auth ─────────────────────────────────────────────────────────────────
async function init() {
  if (!sbClient) {
    document.getElementById('auth-gate').style.display = '';
    return;
  }

  const { data: { session } } = await sbClient.auth.getSession();

  if (!session) {
    document.getElementById('auth-gate').style.display = '';
    return;
  }

  document.getElementById('app').style.display = '';
  await loadSpeciesNames();
  await loadTrees(session.access_token);
}

// ── data ──────────────────────────────────────────────────────────────────
async function loadTrees(token) {
  const listEl = document.getElementById('list');

  try {
    const r = await fetch('/api/saved-trees', {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    allTrees = d.trees || [];
  } catch (e) {
    listEl.innerHTML = `<div class="state-box"><p>Could not load trees: ${e.message}</p></div>`;
    return;
  }

  const sub = document.getElementById('subtitle');
  sub.textContent = allTrees.length === 0
    ? 'No trees saved yet — calculate one and hit "Save tree".'
    : `${allTrees.length} tree${allTrees.length === 1 ? '' : 's'} saved`;

  renderCards(allTrees);
}

function filterCards() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  if (!q) { renderCards(allTrees); return; }
  const filtered = allTrees.filter(t =>
    (speciesNames[t.species_key] || t.species_key).toLowerCase().includes(q) ||
    (t.notes || '').toLowerCase().includes(q)
  );
  renderCards(filtered);
}

function renderCards(trees) {
  const listEl = document.getElementById('list');
  if (!trees.length) {
    listEl.innerHTML = '<div class="state-box"><p>No trees match your search.</p></div>';
    return;
  }

  listEl.innerHTML = trees.map(t => {
    const name    = speciesNames[t.species_key] || t.species_key;
    const date    = new Date(t.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const mins    = Math.round(t.seconds_total / 60);
    const hasGps  = t.lat != null && t.lng != null;
    const gpsText = hasGps
      ? `📍 ${t.lat.toFixed(5)}, ${t.lng.toFixed(5)}${t.accuracy_m ? ` ±${Math.round(t.accuracy_m)}m` : ''}`
      : '';

    return `
      <div class="tree-card" data-id="${t.id}">
        <div class="tree-card-name">${name}</div>
        <div class="tree-card-delete">
          <button class="btn btn-danger" onclick="deleteTree('${t.id}')">Remove</button>
        </div>
        <div class="tree-card-meta">
          <span>DBH ${t.dbh}&Prime;</span>
          ${t.height_ft ? `<span>H ${t.height_ft}′</span>` : ''}
          ${t.crown_ft  ? `<span>Crown ${t.crown_ft}′</span>` : ''}
          <span>${t.cuts} cuts</span>
          <span>~${mins} min</span>
          <span>${date}</span>
        </div>
        ${t.notes   ? `<div class="tree-card-notes">${escHtml(t.notes)}</div>` : ''}
        ${hasGps    ? `<div class="tree-card-gps">${gpsText}</div>` : ''}
      </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── delete ────────────────────────────────────────────────────────────────
async function deleteTree(id) {
  if (!confirm('Remove this tree from your history?')) return;

  const { data: { session } } = await sbClient.auth.getSession();
  if (!session) { toast('Not signed in'); return; }

  try {
    const r = await fetch(`/api/saved-trees?id=${encodeURIComponent(id)}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${session.access_token}` },
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
  } catch (e) {
    toast('Could not remove tree: ' + e.message);
    return;
  }

  allTrees = allTrees.filter(t => t.id !== id);
  filterCards();
  document.getElementById('subtitle').textContent =
    `${allTrees.length} tree${allTrees.length === 1 ? '' : 's'} saved`;
  toast('Tree removed');
}

// ── toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

init();
</script>
<script src="/assets/bottom-nav.js"></script>
</body>
</html>
