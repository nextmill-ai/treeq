<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="color-scheme" content="light" />
<meta name="theme-color" content="#2d5a3d" />
<title>TreeQ — Spartan</title>
<style>
  :root {
    --forest: #2d5a3d;
    --forest-dark: #1f4029;
    --forest-soft: #3d6f4f;
    --gold: #e9c466;
    --gold-soft: #f4dba0;
    --cream: #f4f8f1;
    --cream-deep: #e9efe4;
    --ink: #1a2a1f;
    --muted: #6b7a6f;
    --border: #d9e1d6;
    --bubble-user: #e6efe1;
    --bubble-asst: #ffffff;
    --danger: #c2410c;
    --shadow: 0 1px 2px rgba(45,90,61,.08), 0 4px 12px rgba(45,90,61,.06);
    --shadow-strong: 0 4px 16px rgba(45,90,61,.18);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--cream); color: var(--ink);
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { max-width: 480px; margin: 0 auto; min-height: 100vh; min-height: 100dvh;
    padding: 14px 14px max(14px, env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 12px; }

  /* ---------------- Header ---------------- */
  header.dashboard-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 2px; flex-shrink: 0;
  }
  header.dashboard-head .brand { display: flex; flex-direction: column; gap: 1px; }
  header.dashboard-head h1 { margin: 0; font-size: 20px; color: var(--forest); letter-spacing: -0.01em; }
  header.dashboard-head .tenant { font-size: 12px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
  header.dashboard-head .corner-actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
    background: white; color: var(--forest); display: grid; place-items: center; cursor: pointer;
    transition: background 0.12s;
  }
  .icon-btn:hover, .icon-btn:active { background: var(--cream-deep); }
  .icon-btn svg { width: 18px; height: 18px; }

  /* ---------------- Home screen ---------------- */
  .home { display: flex; flex-direction: column; gap: 14px; flex: 1 1 auto; }
  .chips { display: flex; flex-direction: column; gap: 8px; }
  .chip {
    background: white; border: 1px solid var(--border); border-radius: 14px;
    padding: 12px 14px; font-size: 14px; color: var(--ink); cursor: pointer;
    box-shadow: var(--shadow); text-align: left; transition: all 0.12s;
    display: flex; align-items: center; gap: 10px; line-height: 1.3; font: inherit; font-size: 14px;
  }
  .chip:hover, .chip:active { border-color: var(--forest); background: var(--cream-deep); }
  .chip .chip-tag {
    font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
    background: var(--cream-deep); border-radius: 6px; padding: 3px 6px; flex-shrink: 0;
  }
  .chip .chip-text { flex: 1; }

  /* Text-input ask bar */
  .ask-bar { display: flex; gap: 8px; align-items: stretch; margin-top: 4px; }
  .ask-bar input {
    flex: 1; border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 16px; font: inherit; font-size: 15px; background: white;
    color: var(--ink); box-shadow: var(--shadow); min-width: 0;
  }
  .ask-bar input:focus { outline: 2px solid var(--gold); outline-offset: 0; border-color: var(--gold); }
  .ask-bar .send-btn {
    width: 48px; border-radius: 14px; border: 0; background: var(--forest); color: white;
    cursor: pointer; display: grid; place-items: center; box-shadow: var(--shadow);
  }
  .ask-bar .send-btn:disabled { background: var(--muted); cursor: default; }
  .ask-bar .send-btn svg { width: 20px; height: 20px; }

  /* Mic + photo zone */
  .voice-zone { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px 0 8px; }
  .mic-btn {
    width: 96px; height: 96px; border-radius: 50%; border: 0;
    background: linear-gradient(135deg, var(--forest), var(--forest-soft));
    color: white; cursor: pointer; box-shadow: var(--shadow-strong);
    display: grid; place-items: center; transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
    touch-action: none; user-select: none;
  }
  .mic-btn:active, .mic-btn.recording {
    transform: scale(0.96);
    background: linear-gradient(135deg, var(--danger), #e25a2c);
    box-shadow: 0 0 0 6px rgba(194,65,12,0.18), var(--shadow-strong);
  }
  .mic-btn svg { width: 38px; height: 38px; }
  .mic-hint { font-size: 12px; color: var(--muted); }
  .mic-hint.recording { color: var(--danger); font-weight: 600; }

  /* ---------------- Conversation view ---------------- */
  .conversation { display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .bubble {
    padding: 10px 14px; border-radius: 16px; max-width: 90%; font-size: 15px;
    line-height: 1.35; box-shadow: var(--shadow); animation: pop 0.16s ease-out;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .bubble.asst { background: var(--bubble-asst); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
  .bubble.user { background: var(--bubble-user); align-self: flex-end; border-bottom-right-radius: 4px;
    color: var(--forest-dark); font-weight: 500; }
  .bubble.system { background: transparent; box-shadow: none; align-self: center; color: var(--muted);
    font-size: 12px; padding: 4px 0; font-style: italic; }

  .input-card { background: white; border: 1px solid var(--border); border-radius: 14px;
    padding: 12px; box-shadow: var(--shadow); align-self: stretch; }
  .input-card .hint { font-size: 12px; color: var(--muted); margin-bottom: 8px; }

  .btn-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .opt-btn { flex: 1 1 calc(50% - 8px); min-width: 0; padding: 12px 10px; border: 1px solid var(--border);
    background: white; border-radius: 10px; font: inherit; font-size: 14px; color: var(--ink);
    cursor: pointer; text-align: center; transition: all 0.12s; }
  .opt-btn:hover, .opt-btn:active { border-color: var(--forest); background: var(--cream); }
  .opt-btn.skip { background: transparent; color: var(--muted); font-style: italic; }

  .check-list { display: flex; flex-direction: column; gap: 6px; }
  .check-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 10px; background: white; cursor: pointer; font-size: 14px; }
  .check-item.selected { border-color: var(--forest); background: var(--bubble-user); }
  .check-item input { accent-color: var(--forest); width: 18px; height: 18px; flex-shrink: 0; }

  .text-input { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    font: inherit; background: white; color: inherit; }
  textarea.text-input { min-height: 64px; resize: vertical; }
  .submit-row { display: flex; gap: 8px; margin-top: 10px; }
  .primary-btn { flex: 1; padding: 12px; border-radius: 10px; border: 0; background: var(--forest);
    color: white; font: inherit; font-size: 15px; font-weight: 600; cursor: pointer; }
  .primary-btn:disabled { background: var(--muted); }
  .ghost-btn { padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: white;
    color: var(--muted); font: inherit; font-size: 14px; cursor: pointer; }
  .add-photo-btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 14px; border: 2px dashed var(--border); border-radius: 10px; background: var(--cream);
    color: var(--forest-dark); font: inherit; font-size: 14px; cursor: pointer; }
  .add-photo-btn input { display: none; }
  .photo-stage { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .photo-thumb { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); }

  /* answer_question card */
  .answer-card { background: white; border: 1px solid var(--border); border-radius: 14px;
    padding: 14px; box-shadow: var(--shadow); align-self: stretch; }
  .answer-card .answer-text { font-size: 15px; line-height: 1.4; color: var(--ink); }
  .sources { margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--border);
    display: flex; flex-direction: column; gap: 6px; }
  .sources .src-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .source {
    display: flex; gap: 8px; padding: 8px 10px; background: var(--cream-deep);
    border-radius: 8px; font-size: 13px; line-height: 1.3;
    border-left: 3px solid var(--forest); text-decoration: none; color: var(--ink);
  }
  .source .src-kind { font-size: 10px; color: var(--forest); font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.04em; flex-shrink: 0; padding-top: 2px; }
  .source .src-body { flex: 1; min-width: 0; }
  .source .src-title { font-weight: 600; color: var(--forest-dark); }
  .source .src-snippet { color: var(--muted); font-size: 12px; margin-top: 1px; word-break: break-word; }
  .followups { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .followup-chip {
    display: inline-flex; padding: 8px 12px; background: white; border: 1px solid var(--border);
    border-radius: 10px; font-size: 13px; color: var(--forest-dark); cursor: pointer;
    text-align: left; font: inherit; font-size: 13px;
  }
  .followup-chip:hover, .followup-chip:active { border-color: var(--forest); background: var(--cream); }

  /* finalize_estimate card */
  .estimate-card { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 16px;
    box-shadow: var(--shadow); align-self: stretch; }
  .estimate-card.escalate { background: #fff4e6; border-color: #f3c98f; }
  .price-hero { text-align: center; padding: 8px 0 12px; }
  .price-hero .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
  .price-hero .value { font-size: 38px; font-weight: 700; color: var(--forest); margin-top: 4px;
    font-variant-numeric: tabular-nums; }
  .price-hero .range { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .esc-banner { color: var(--danger); font-weight: 600; font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 6px; text-align: center; }
  .line-items { list-style: none; padding: 0; margin: 8px 0 0; }
  .line-items li { padding: 8px 0; border-top: 1px dashed var(--border); display: grid;
    grid-template-columns: 1fr auto; gap: 2px 8px; font-size: 14px; }
  .line-items .amt { color: var(--forest); font-variant-numeric: tabular-nums; font-weight: 600; }
  .line-items .notes { grid-column: 1 / -1; font-size: 12px; color: var(--muted); }

  .thinking { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px;
    align-self: flex-start; padding: 8px 0; }
  .thinking .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--forest);
    animation: bounce 1.4s infinite ease-in-out both; }
  .thinking .dot:nth-child(2) { animation-delay: -0.16s; } .thinking .dot:nth-child(3) { animation-delay: -0.32s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

  .error { color: var(--danger); font-size: 13px; padding: 8px; background: #fef2ec;
    border-radius: 8px; align-self: stretch; }

  /* Bottom utility bar in conversation view */
  .conv-foot { display: flex; gap: 8px; padding-top: 6px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .conv-foot button { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
    background: white; color: var(--forest-dark); font: inherit; font-size: 13px; cursor: pointer; }
  .conv-foot button.danger { color: var(--danger); border-color: var(--border); }

  /* Hidden helpers */
  [hidden] { display: none !important; }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<section id="home" class="home">
  <header class="dashboard-head">
    <div class="brand">
      <h1>TreeQ</h1>
      <div class="tenant" id="tenant-name">Spartan Tree</div>
    </div>
    <div class="corner-actions">
      <button class="icon-btn" id="btn-knowledge" title="Knowledge sources" aria-label="Knowledge sources">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </button>
    </div>
  </header>

  <div class="chips" id="chips">
    <!-- Suggestion chips rendered by JS -->
  </div>

  <div class="ask-bar">
    <input id="ask-input" type="text" placeholder="Ask anything…" autocomplete="off" enterkeyhint="send" />
    <button class="send-btn" id="send-btn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

  <div class="voice-zone">
    <button class="mic-btn" id="mic-btn" aria-label="Hold to record" title="Hold to record">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>
    <div id="mic-hint" class="mic-hint">Hold to record · or tap to type</div>
  </div>

  <div style="display:flex; justify-content:center; gap:14px; margin-top: auto;">
    <button class="icon-btn" id="btn-camera" title="Photo" aria-label="Price from photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </button>
  </div>
</section>

<!-- CONVERSATION SCREEN -->
<section id="conversation-view" hidden>
  <header class="dashboard-head">
    <div class="brand">
      <h1 style="font-size:16px;">TreeQ</h1>
      <div class="tenant" id="conv-thread-label">Today's thread</div>
    </div>
    <div class="corner-actions">
      <button class="icon-btn" id="btn-home" aria-label="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
    </div>
  </header>
  <div class="conversation" id="conversation"></div>
  <div class="conv-foot">
    <button id="btn-new-thread" class="danger" title="Start a new thread today">Restart</button>
    <button id="btn-back-home">Home</button>
  </div>
</section>

<!-- Hidden file inputs for camera + photo (used from input cards too) -->
<input type="file" id="camera-input" accept="image/*" capture="environment" hidden />

<script type="module">
'use strict';
window.addEventListener('error', e => console.error('[TreeQ]', e.message, e.filename + ':' + e.lineno));
window.addEventListener('unhandledrejection', e => console.error('[TreeQ unhandled]', e.reason));

/* ------------------------------------------------------------
 * Constants and state
 * ------------------------------------------------------------ */
const TREEQ_API = '/.netlify/functions/treeq-ai';
const TRANSCRIBE_API = '/.netlify/functions/transcribe';
const TENANT_NAME = 'Spartan Tree';
const fmt = (n) => n == null ? '—' : '$' + Math.round(n).toLocaleString();

// Daily thread persistence — one localStorage entry per UTC date.
function utcDateKey(d = new Date()) {
  return d.toISOString().slice(0, 10);
}
function threadStorageKey(date = utcDateKey()) {
  return 'treeq:thread:' + date;
}

const initialState = {
  messages: [],
  conversation_id: null,
  quote_id: null,
  pendingPhotos: [],   // [{mediaType, data, preview}] queued for next turn
  busy: false,
  thread_date: utcDateKey(),
};

function loadThread() {
  try {
    const raw = localStorage.getItem(threadStorageKey());
    if (!raw) return { ...initialState };
    const saved = JSON.parse(raw);
    return { ...initialState, ...saved };
  } catch (e) {
    console.error('Could not load thread:', e);
    return { ...initialState };
  }
}

function saveThread(state) {
  try {
    // Don't persist pendingPhotos (transient) or busy.
    const { pendingPhotos, busy, ...persistable } = state;
    localStorage.setItem(threadStorageKey(persistable.thread_date), JSON.stringify(persistable));
  } catch (e) {
    console.error('Could not save thread:', e);
  }
}

let state = loadThread();

/* ------------------------------------------------------------
 * DOM refs
 * ------------------------------------------------------------ */
const homeEl = document.getElementById('home');
const convViewEl = document.getElementById('conversation-view');
const convEl = document.getElementById('conversation');
const askInput = document.getElementById('ask-input');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');
const micHint = document.getElementById('mic-hint');
const chipsEl = document.getElementById('chips');
const tenantEl = document.getElementById('tenant-name');
const cameraInput = document.getElementById('camera-input');
const convThreadLabel = document.getElementById('conv-thread-label');
const btnCamera = document.getElementById('btn-camera');
const btnKnowledge = document.getElementById('btn-knowledge');
const btnHome = document.getElementById('btn-home');
const btnBackHome = document.getElementById('btn-back-home');
const btnNewThread = document.getElementById('btn-new-thread');

tenantEl.textContent = TENANT_NAME;
convThreadLabel.textContent = humanThreadLabel(state.thread_date);

/* ------------------------------------------------------------
 * Suggestion chips
 *   v0.1: static + time-of-day. Smart chips arrive later via /.netlify/functions/suggestions.
 * ------------------------------------------------------------ */
function timeOfDayChip() {
  const h = new Date().getHours();
  if (h < 11) return { text: "What's on the schedule today?", tag: 'Today' };
  if (h < 16) return { text: 'Any open quotes I should follow up on?', tag: 'Followup' };
  return { text: 'Recap what got done today', tag: 'Recap' };
}

function defaultChips() {
  return [
    { text: 'Price a tree job', tag: 'Estimate' },
    { text: "What's our 30\" stump rate?", tag: 'Pricing' },
    timeOfDayChip(),
  ];
}

function renderChips() {
  chipsEl.innerHTML = '';
  for (const chip of defaultChips()) {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.innerHTML = `<span class="chip-tag">${chip.tag}</span><span class="chip-text"></span>`;
    btn.querySelector('.chip-text').textContent = chip.text;
    btn.addEventListener('click', () => startConversation({ user_turn: chip.text }));
    chipsEl.appendChild(btn);
  }
}
renderChips();

/* ------------------------------------------------------------
 * Routing between home and conversation views
 * ------------------------------------------------------------ */
function showHome() {
  homeEl.hidden = false;
  convViewEl.hidden = true;
}
function showConversation() {
  homeEl.hidden = true;
  convViewEl.hidden = false;
  convEl.scrollTop = convEl.scrollHeight;
}

btnHome.addEventListener('click', () => { saveThread(state); showHome(); });
btnBackHome.addEventListener('click', () => { saveThread(state); showHome(); });
btnNewThread.addEventListener('click', () => {
  if (!confirm('Start a fresh conversation? This clears today\'s thread on this device.')) return;
  localStorage.removeItem(threadStorageKey());
  state = { ...initialState, thread_date: utcDateKey() };
  convEl.innerHTML = '';
  showHome();
});

// On load, if there's an in-flight thread, re-render its bubbles silently (no replay of network turns).
if (state.messages.length > 0) {
  renderHistoricalThread();
}

function renderHistoricalThread() {
  convEl.innerHTML = '';
  for (const m of state.messages) {
    if (m.role === 'user') {
      const text = (m.content || []).filter(b => b.type === 'text').map(b => b.text).join(' ').trim();
      if (text && !text.startsWith('## Operational context')) addBubble('user', text);
    } else if (m.role === 'assistant') {
      // Try to render the last tool call shape.
      for (const block of (m.content || [])) {
        if (block.type === 'tool_use') {
          if (block.name === 'ask_question') addBubble('asst', block.input.message || '');
          else if (block.name === 'answer_question') {
            renderAnswerCard(block.input, /*append*/ true);
          } else if (block.name === 'finalize_estimate') {
            renderEstimateCard(block.input);
          }
        }
      }
    }
  }
}

/* ------------------------------------------------------------
 * Send + render helpers
 * ------------------------------------------------------------ */
function addBubble(role, text) {
  const el = document.createElement('div');
  el.className = `bubble ${role}`;
  el.textContent = text;
  convEl.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return el;
}
function addSystemNote(text) {
  const el = document.createElement('div');
  el.className = 'bubble system';
  el.textContent = text;
  convEl.appendChild(el);
}
function showThinking() {
  const el = document.createElement('div');
  el.className = 'thinking';
  el.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span><span>Thinking…</span>';
  convEl.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return el;
}
function clearInputCard() {
  document.querySelectorAll('#conversation .input-card, #conversation .thinking').forEach(n => n.remove());
}
function showError(msg) {
  const el = document.createElement('div');
  el.className = 'error';
  el.textContent = msg;
  convEl.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

async function fileToImage(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => {
      const dataUrl = r.result;
      const [meta, b64] = dataUrl.split(',');
      const mediaType = meta.match(/data:(.*?);base64/)[1];
      resolve({ mediaType, data: b64, preview: dataUrl });
    };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function humanThreadLabel(dateStr) {
  const d = new Date(dateStr + 'T00:00:00Z');
  return d.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
}

/* ------------------------------------------------------------
 * Core: post a turn to /treeq-ai
 * ------------------------------------------------------------ */
async function postTurn(userTurn, opts = {}) {
  if (state.busy) return;
  state.busy = true;
  sendBtn.disabled = true;
  askInput.disabled = true;
  const thinkingEl = showThinking();

  // Echo user bubble first if it was text-only (photos rendered separately).
  if (userTurn && !opts.suppressEcho) addBubble('user', userTurn);

  const photos = state.pendingPhotos.slice();
  state.pendingPhotos = [];

  try {
    const resp = await fetch(TREEQ_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: state.messages,
        user_turn: userTurn,
        new_photos: photos.map(p => ({ mediaType: p.mediaType, data: p.data })),
        photos_summary: photos.map(p => ({ mediaType: p.mediaType, role: p.role || null })),
        quote_id: state.quote_id,
        conversation_id: state.conversation_id,
      }),
    });
    thinkingEl.remove();
    if (!resp.ok) {
      const errBody = await resp.json().catch(() => ({}));
      throw new Error(errBody.error || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    state.messages = data.messages || state.messages;
    state.conversation_id = data.conversation_id || state.conversation_id;
    if (data.quote_id) state.quote_id = data.quote_id;

    if (data.kind === 'ask_question') renderQuestion(data.question);
    else if (data.kind === 'answer_question') renderAnswerCard(data.answer);
    else if (data.kind === 'finalize_estimate') renderEstimateCard(data.estimate);
    else showError('Unexpected response from server.');

    saveThread(state);
  } catch (e) {
    thinkingEl.remove();
    console.error(e);
    showError(e.message || 'Network error. Try again.');
  } finally {
    state.busy = false;
    sendBtn.disabled = false;
    askInput.disabled = false;
  }
}

function startConversation({ user_turn = null, photos = [] } = {}) {
  showConversation();
  if (photos.length) state.pendingPhotos.push(...photos);
  postTurn(user_turn || (photos.length ? 'Price this job from the photo(s).' : '[opens chat]'));
}

/* ------------------------------------------------------------
 * Rendering: ask_question widget
 * ------------------------------------------------------------ */
function renderQuestion(q) {
  clearInputCard();
  if (q.message) addBubble('asst', q.message);

  const card = document.createElement('div');
  card.className = 'input-card';

  const kind = q.input?.kind || 'text';

  if (kind === 'buttons') {
    const row = document.createElement('div');
    row.className = 'btn-row';
    const opts = q.input.allow_skip === false ? q.input.options : [...(q.input.options || []), { label: 'Not sure / Skip', value: 'skip' }];
    for (const opt of opts) {
      const b = document.createElement('button');
      b.className = 'opt-btn' + (opt.value === 'skip' ? ' skip' : '');
      b.textContent = (opt.emoji ? opt.emoji + '  ' : '') + opt.label;
      b.addEventListener('click', () => {
        card.remove();
        postTurn(opt.label || opt.value, { suppressEcho: false });
      });
      row.appendChild(b);
    }
    card.appendChild(row);

  } else if (kind === 'checkboxes') {
    const list = document.createElement('div');
    list.className = 'check-list';
    const chosen = new Set();
    for (const opt of (q.input.options || [])) {
      const item = document.createElement('label');
      item.className = 'check-item';
      item.innerHTML = `<input type="checkbox" value="${opt.value}"><span></span>`;
      item.querySelector('span').textContent = (opt.emoji ? opt.emoji + '  ' : '') + opt.label;
      const cb = item.querySelector('input');
      cb.addEventListener('change', () => {
        if (cb.checked) { chosen.add(opt.value); item.classList.add('selected'); }
        else { chosen.delete(opt.value); item.classList.remove('selected'); }
      });
      list.appendChild(item);
    }
    card.appendChild(list);
    const submit = document.createElement('div');
    submit.className = 'submit-row';
    submit.innerHTML = '<button class="primary-btn">Continue</button><button class="ghost-btn">Skip</button>';
    submit.children[0].addEventListener('click', () => {
      const labels = [...chosen];
      card.remove();
      postTurn(labels.length ? labels.join(', ') : 'none');
    });
    submit.children[1].addEventListener('click', () => { card.remove(); postTurn('skip'); });
    card.appendChild(submit);

  } else if (kind === 'photo_request') {
    const stage = document.createElement('div');
    stage.className = 'photo-stage';
    const addBtn = document.createElement('label');
    addBtn.className = 'add-photo-btn';
    addBtn.innerHTML = '<span>+ Add photo</span><input type="file" accept="image/*" capture="environment">';
    const fileInput = addBtn.querySelector('input');
    fileInput.addEventListener('change', async (e) => {
      for (const f of e.target.files) {
        const img = await fileToImage(f);
        state.pendingPhotos.push({ ...img, role: q.input.photo_role || null });
        const t = document.createElement('img');
        t.className = 'photo-thumb';
        t.src = img.preview;
        stage.insertBefore(t, addBtn);
      }
    });
    stage.appendChild(addBtn);
    card.appendChild(stage);
    const submit = document.createElement('div');
    submit.className = 'submit-row';
    submit.innerHTML = '<button class="primary-btn">Send photos</button><button class="ghost-btn">Skip</button>';
    submit.children[0].addEventListener('click', () => {
      if (state.pendingPhotos.length === 0) { showError('Add at least one photo or tap Skip.'); return; }
      card.remove();
      postTurn(`[sent ${state.pendingPhotos.length} photo(s)]`, { suppressEcho: false });
    });
    submit.children[1].addEventListener('click', () => { card.remove(); postTurn('skip'); });
    card.appendChild(submit);

  } else if (kind === 'number') {
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.className = 'text-input';
    inp.placeholder = q.input.placeholder || (q.input.unit ? `e.g. 24 (${q.input.unit})` : 'enter a number');
    if (q.input.min != null) inp.min = q.input.min;
    if (q.input.max != null) inp.max = q.input.max;
    card.appendChild(inp);
    const submit = document.createElement('div');
    submit.className = 'submit-row';
    submit.innerHTML = '<button class="primary-btn">Send</button><button class="ghost-btn">Skip</button>';
    submit.children[0].addEventListener('click', () => {
      const v = inp.value.trim();
      if (!v) { showError('Enter a value or tap Skip.'); return; }
      card.remove();
      postTurn(v + (q.input.unit ? ' ' + q.input.unit : ''));
    });
    submit.children[1].addEventListener('click', () => { card.remove(); postTurn('skip'); });
    card.appendChild(submit);
    setTimeout(() => inp.focus(), 50);

  } else {
    // text (default) + species_picker fallback
    const ta = document.createElement('textarea');
    ta.className = 'text-input';
    ta.placeholder = q.input?.placeholder || 'Type your answer…';
    card.appendChild(ta);
    const submit = document.createElement('div');
    submit.className = 'submit-row';
    submit.innerHTML = '<button class="primary-btn">Send</button><button class="ghost-btn">Skip</button>';
    submit.children[0].addEventListener('click', () => {
      const v = ta.value.trim();
      if (!v) { showError('Type something or tap Skip.'); return; }
      card.remove();
      postTurn(v);
    });
    submit.children[1].addEventListener('click', () => { card.remove(); postTurn('skip'); });
    card.appendChild(submit);
    setTimeout(() => ta.focus(), 50);
  }

  convEl.appendChild(card);
  card.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

/* ------------------------------------------------------------
 * Rendering: answer_question card (with citations)
 * ------------------------------------------------------------ */
function renderAnswerCard(ans, isHistorical = false) {
  if (!isHistorical) clearInputCard();
  const card = document.createElement('div');
  card.className = 'answer-card';

  const text = document.createElement('div');
  text.className = 'answer-text';
  text.textContent = ans.answer || '(no answer)';
  card.appendChild(text);

  if (Array.isArray(ans.sources) && ans.sources.length) {
    const wrap = document.createElement('div');
    wrap.className = 'sources';
    const lbl = document.createElement('div');
    lbl.className = 'src-label';
    lbl.textContent = `Sources (${ans.sources.length})`;
    wrap.appendChild(lbl);
    for (const s of ans.sources) {
      const el = document.createElement(s.ref_id && s.kind !== 'methodology' ? 'a' : 'div');
      el.className = 'source';
      if (el.tagName === 'A' && s.ref_id) {
        el.href = `https://www.notion.so/${s.ref_id.replace(/-/g, '')}`;
        el.target = '_blank';
        el.rel = 'noopener noreferrer';
      }
      el.innerHTML = `
        <span class="src-kind">${s.kind || ''}</span>
        <span class="src-body">
          <span class="src-title"></span>
          <span class="src-snippet"></span>
        </span>`;
      el.querySelector('.src-title').textContent = s.title || '';
      el.querySelector('.src-snippet').textContent = s.snippet || '';
      wrap.appendChild(el);
    }
    card.appendChild(wrap);
  }

  if (Array.isArray(ans.followups) && ans.followups.length) {
    const wrap = document.createElement('div');
    wrap.className = 'followups';
    for (const f of ans.followups) {
      const b = document.createElement('button');
      b.className = 'followup-chip';
      b.textContent = f;
      b.addEventListener('click', () => postTurn(f));
      wrap.appendChild(b);
    }
    card.appendChild(wrap);
  }

  convEl.appendChild(card);
  card.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

/* ------------------------------------------------------------
 * Rendering: finalize_estimate card
 * ------------------------------------------------------------ */
function renderEstimateCard(est) {
  clearInputCard();
  const card = document.createElement('div');
  card.className = 'estimate-card' + (est.escalate ? ' escalate' : '');

  if (est.escalate) {
    const banner = document.createElement('div');
    banner.className = 'esc-banner';
    banner.textContent = 'Escalate to Cameron';
    card.appendChild(banner);
  }

  const hero = document.createElement('div');
  hero.className = 'price-hero';
  hero.innerHTML = `
    <div class="label">${est.escalate ? 'Rough range — confirm with owner' : 'Estimated price'}</div>
    <div class="value">${fmt(est.price)}</div>
    <div class="range">${fmt(est.price_low)} – ${fmt(est.price_high)}</div>`;
  card.appendChild(hero);

  if (est.escalate_reason) {
    const w = document.createElement('div');
    w.style.cssText = 'font-size:13px; color:var(--danger); margin: 6px 0;';
    w.textContent = est.escalate_reason;
    card.appendChild(w);
  }

  if (Array.isArray(est.line_items) && est.line_items.length) {
    const ul = document.createElement('ul');
    ul.className = 'line-items';
    for (const li of est.line_items) {
      const item = document.createElement('li');
      const left = document.createElement('span');
      left.textContent = li.label + (li.quantity ? ` × ${li.quantity}${li.unit ? ' ' + li.unit : ''}` : '');
      const amt = document.createElement('span');
      amt.className = 'amt';
      amt.textContent = fmt(li.subtotal);
      item.appendChild(left); item.appendChild(amt);
      if (li.notes) {
        const n = document.createElement('span');
        n.className = 'notes';
        n.textContent = li.notes;
        item.appendChild(n);
      }
      ul.appendChild(item);
    }
    card.appendChild(ul);
  }

  if (est.reasoning) {
    const rNote = document.createElement('div');
    rNote.style.cssText = 'margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);font-size:12px;color:var(--muted);line-height:1.35;';
    rNote.innerHTML = '<strong style="color:var(--forest-dark);">For you (not the customer):</strong><br>';
    const t = document.createElement('span');
    t.textContent = est.reasoning;
    rNote.appendChild(t);
    card.appendChild(rNote);
  }

  if (Array.isArray(est.salesperson_followups) && est.salesperson_followups.length) {
    const ul = document.createElement('ul');
    ul.style.cssText = 'margin:10px 0 0;padding-left:18px;font-size:12px;color:var(--muted);';
    for (const f of est.salesperson_followups) {
      const li = document.createElement('li');
      li.textContent = f;
      ul.appendChild(li);
    }
    card.appendChild(ul);
  }

  convEl.appendChild(card);
  card.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

/* ------------------------------------------------------------
 * Home-bar wiring (send, mic, camera, knowledge)
 * ------------------------------------------------------------ */
sendBtn.addEventListener('click', () => {
  const v = askInput.value.trim();
  if (!v) return;
  askInput.value = '';
  startConversation({ user_turn: v });
});
askInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); sendBtn.click(); }
});

btnCamera.addEventListener('click', () => cameraInput.click());
cameraInput.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  const photos = await Promise.all(files.map(fileToImage));
  cameraInput.value = '';
  startConversation({ user_turn: 'Price this job from the photo(s).', photos });
});

btnKnowledge.addEventListener('click', () => {
  // Mobile read-only listing — opens the admin page in read mode.
  // Stage 1: just send the user to a known-source query.
  startConversation({ user_turn: 'List my connected knowledge sources.' });
});

/* ------------------------------------------------------------
 * Push-to-hold mic
 * ------------------------------------------------------------ */
let mediaRecorder = null;
let recordedChunks = [];
let recordingStartedAt = 0;
let recordStream = null;

async function startRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') return;
  try {
    recordStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    showError('Microphone permission denied.');
    return;
  }
  // Pick a sensible mime — Safari iOS gives audio/mp4, Chrome gives audio/webm.
  const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
            : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
            : '';
  mediaRecorder = new MediaRecorder(recordStream, mime ? { mimeType: mime } : undefined);
  recordedChunks = [];
  mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    micBtn.classList.remove('recording');
    micHint.classList.remove('recording');
    micHint.textContent = 'Transcribing…';
    if (recordStream) { recordStream.getTracks().forEach(t => t.stop()); recordStream = null; }
    const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
    const duration = (Date.now() - recordingStartedAt) / 1000;
    if (duration < 0.4 || blob.size < 800) {
      micHint.textContent = 'Hold to record · or tap to type';
      return; // Treat as accidental tap.
    }
    try {
      const transcript = await transcribeBlob(blob);
      micHint.textContent = 'Hold to record · or tap to type';
      if (transcript && transcript.trim()) startConversation({ user_turn: transcript.trim() });
    } catch (e) {
      console.error(e);
      micHint.textContent = 'Transcription failed';
      showError(e.message || 'Transcription failed.');
    }
  };
  recordingStartedAt = Date.now();
  mediaRecorder.start();
  micBtn.classList.add('recording');
  micHint.classList.add('recording');
  micHint.textContent = 'Recording… release to send';
}
function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
}

async function transcribeBlob(blob) {
  // base64-encode the blob and POST to /transcribe.
  const buf = await blob.arrayBuffer();
  const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
  const resp = await fetch(TRANSCRIBE_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ media_type: blob.type || 'audio/webm', audio_b64: b64 }),
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error || `Transcribe HTTP ${resp.status}`);
  }
  const data = await resp.json();
  return data.text || '';
}

// Push-to-hold semantics: pointerdown→start, pointerup/leave→stop.
let micPointerDown = false;
micBtn.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  micPointerDown = true;
  startRecording();
});
micBtn.addEventListener('pointerup', (e) => {
  e.preventDefault();
  if (micPointerDown) { micPointerDown = false; stopRecording(); }
});
micBtn.addEventListener('pointerleave', () => {
  if (micPointerDown) { micPointerDown = false; stopRecording(); }
});
micBtn.addEventListener('pointercancel', () => {
  if (micPointerDown) { micPointerDown = false; stopRecording(); }
});
