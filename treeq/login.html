<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>TreeQ — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --forest: #2d5a3d;
    --cream: #f4f8f1;
    --gold: #e9c466;
    --ink: #14241b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    min-height: 100vh;
    background: #ddd;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .frame {
    max-width: 480px;
    min-height: 100vh;
    margin: 0 auto;
    background: var(--cream);
    box-shadow: 0 0 32px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
  }
  .panel {
    width: 100%;
    text-align: center;
  }
  .btn-google {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    max-width: 320px;
    min-height: 48px;
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    background: var(--forest);
    color: var(--cream);
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(45, 90, 61, 0.25);
    transition: background 0.15s ease, transform 0.1s ease, opacity 0.15s ease;
  }
  .btn-google:hover:not(:disabled) {
    background: #244a32;
  }
  .btn-google:active:not(:disabled) {
    transform: scale(0.98);
  }
  .btn-google:disabled {
    opacity: 0.65;
    cursor: wait;
  }
  .btn-google .g-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    background: var(--cream);
    border-radius: 4px;
    display: grid;
    place-items: center;
    font-size: 12px;
    font-weight: 800;
    color: var(--forest);
  }
  .loading {
    margin-top: 20px;
    font-size: 14px;
    color: var(--forest);
    font-weight: 500;
    min-height: 1.4em;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .loading.visible {
    opacity: 1;
  }
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    margin-right: 8px;
    vertical-align: middle;
    border: 2px solid rgba(45, 90, 61, 0.25);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="panel">
      <button type="button" class="btn-google" id="btnGoogle" aria-busy="false">
        <span class="g-icon" aria-hidden="true">G</span>
        <span>Sign in with Google</span>
      </button>
      <p class="loading" id="loading" role="status" aria-live="polite"></p>
    </div>
  </div>
<script>
(function () {
  const SUPABASE_URL = 'https://bhbubaopejjxijiqmujy.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_CT6kIbqjVG5sbWLn_E1hQw_Hir_U65U';

  const btn = document.getElementById('btnGoogle');
  const loadingEl = document.getElementById('loading');

  function setLoading(on) {
    btn.disabled = on;
    btn.setAttribute('aria-busy', on ? 'true' : 'false');
    if (on) {
      loadingEl.classList.add('visible');
      loadingEl.innerHTML = '<span class="spinner" aria-hidden="true"></span>Redirecting…';
    } else {
      loadingEl.classList.remove('visible');
      loadingEl.textContent = '';
    }
  }

  if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
    loadingEl.classList.add('visible');
    loadingEl.textContent = 'Supabase client failed to load.';
    btn.disabled = true;
    return;
  }

  const { createClient } = window.supabase;
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  btn.addEventListener('click', async function () {
    setLoading(true);
    try {
      await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin
        }
      });
    } catch (e) {
      setLoading(false);
      loadingEl.classList.add('visible');
      loadingEl.textContent = 'Could not start sign-in. Try again.';
    }
  });
})();
</script>
</body>
</html>
