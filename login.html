<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="light" />
<title>TreeQ — Sign in</title>
<style>
  :root {
    --forest: #2d5a3d;
    --forest-dark: #1f4029;
    --gold: #e9c466;
    --cream: #f4f8f1;
    --ink: #1a2a1f;
    --muted: #6b7a6f;
    --border: #d9e1d6;
    --shadow: 0 1px 2px rgba(45,90,61,.08), 0 4px 12px rgba(45,90,61,.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--cream); color: var(--ink);
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { max-width: 420px; margin: 0 auto; min-height: 100vh; padding: 36px 24px;
    display: flex; flex-direction: column; justify-content: center; }
  h1 { color: var(--forest); font-size: 28px; margin: 0 0 6px; text-align: center; }
  .sub { color: var(--muted); text-align: center; font-size: 13px; margin-bottom: 28px; }
  .auth-card { background: white; border: 1px solid var(--border); border-radius: 14px;
    padding: 22px; box-shadow: var(--shadow); }
  .login-btn {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px; border: 1px solid var(--border); background: white; color: var(--ink);
    border-radius: 10px; font: inherit; font-size: 15px; font-weight: 500;
    margin-bottom: 10px; cursor: not-allowed; opacity: 0.7; position: relative;
  }
  .login-btn.apple  { background: black; color: white; border-color: black; }
  .login-btn.google { background: white; color: var(--ink); }
  .login-btn.phone  { background: var(--forest); color: white; border-color: var(--forest); }
  .login-btn svg { width: 18px; height: 18px; }
  .soon-tag {
    background: var(--gold); color: var(--forest-dark); padding: 2px 8px; font-size: 10px;
    border-radius: 100px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;
    margin-left: 6px;
  }
  .footnote {
    margin-top: 20px; font-size: 12px; color: var(--muted); text-align: center; line-height: 1.4;
  }
  .gate-banner {
    background: var(--cream); border: 1px dashed var(--border); border-radius: 10px;
    padding: 10px 12px; font-size: 12px; color: var(--muted); text-align: center;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<h1>TreeQ</h1>
<div class="sub">Sign in to continue.</div>

<div class="auth-card">
  <div class="gate-banner" id="gate-banner">
    Auth is currently off (free build). The buttons below are wired but disabled.
  </div>

  <button class="login-btn apple" id="btn-apple" disabled>
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 12.04c-.03-2.74 2.24-4.06 2.34-4.13-1.27-1.85-3.25-2.1-3.96-2.13-1.68-.17-3.28.99-4.14.99-.86 0-2.17-.97-3.57-.94-1.83.03-3.52 1.07-4.46 2.71-1.9 3.3-.49 8.18 1.36 10.86.9 1.31 1.97 2.78 3.37 2.73 1.36-.05 1.87-.88 3.51-.88s2.1.88 3.54.85c1.46-.03 2.39-1.34 3.29-2.65 1.04-1.52 1.47-2.99 1.49-3.07-.03-.01-2.84-1.09-2.87-4.34zM14.35 4.36c.74-.9 1.24-2.14 1.1-3.36-1.07.04-2.36.71-3.13 1.6-.68.79-1.29 2.06-1.13 3.26 1.19.09 2.42-.6 3.16-1.5z"/></svg>
    Continue with Apple
    <span class="soon-tag">soon</span>
  </button>

  <button class="login-btn google" id="btn-google" disabled>
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M21.6 12.2c0-.7-.1-1.3-.2-2H12v3.8h5.4c-.2 1.3-.9 2.3-2 3v2.5h3.2c1.9-1.7 3-4.3 3-7.3z"/><path fill="#34A853" d="M12 22c2.7 0 5-.9 6.6-2.4l-3.2-2.5c-.9.6-2 1-3.4 1-2.6 0-4.9-1.8-5.7-4.2H3v2.6C4.7 19.8 8.1 22 12 22z"/><path fill="#FBBC05" d="M6.3 13.9c-.2-.6-.3-1.3-.3-1.9s.1-1.3.3-1.9V7.5H3c-.7 1.4-1 2.9-1 4.5s.4 3.1 1 4.5l3.3-2.6z"/><path fill="#EA4335" d="M12 5.4c1.5 0 2.8.5 3.8 1.5l2.8-2.8C16.9 2.5 14.7 1.6 12 1.6c-3.9 0-7.3 2.2-9 5.4l3.3 2.6C7.1 7.2 9.4 5.4 12 5.4z"/></svg>
    Continue with Google
    <span class="soon-tag">soon</span>
  </button>

  <button class="login-btn phone" id="btn-phone" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    Continue with phone
    <span class="soon-tag">soon</span>
  </button>

  <div class="footnote">
    By signing in you agree to TreeQ's Terms & Privacy Policy.<br>
    Magic-link email is also available — set <code>?email=on</code> in the URL after flag-flip.
  </div>
</div>

<script type="module">
import { isAuthDisabled } from './auth.js';
const banner = document.getElementById('gate-banner');
if (!isAuthDisabled()) {
  banner.textContent = 'Pick your sign-in method.';
  for (const id of ['btn-apple', 'btn-google', 'btn-phone']) {
    const b = document.getElementById(id);
    b.disabled = false;
    b.style.opacity = '1';
    b.style.cursor = 'pointer';
  }
  // Real OAuth wiring lives in auth.js + Supabase. Once enabled, attach click handlers here.
}
</script>
</body>
</html>
